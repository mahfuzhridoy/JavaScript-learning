<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom Learning</title>
</head>
<body style="background-color: #212121; color: #fff">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    // Creating new element
    function addLanguage(langName){ // ******* This function can create an XSS vulnerability if the input is coming from the user
        const li = document.createElement('li')
        li.innerHTML = `${langName}` // When we use inner HTM it traverse the whole DOM tree. We can use addtextnode method for optimization. examples is given below

        document.querySelector('.language').appendChild(li)
    }

    addLanguage("python")
    addLanguage("TS")


    function addOptiLanguage(langName){ // This is more optimized function than previous one. because we used createtextnode method here. 
        const li=document.createElement('li')
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)
    }

    addOptiLanguage('Golang')


    // Editing new element
    const secondLang = document.querySelector('li:nth-child(2)')
    //secondLang.innerHTML = "MoJo"
    //secondLang.textContent = "python"

    const newLi = document.createElement('li')
    newLi.textContent = "MOJO"

    secondLang.replaceWith(newLi)

    // edit 2

    const firstLang = document.querySelector('li:first-child')
    //firstLang.outerHTML = "<li>Typescript</li>"



    // Remove

    const lastLang = document.querySelector('li:last-child')
    lastLang.remove()

    

</script>
</html>
