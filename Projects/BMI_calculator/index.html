<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <nav>
        <button class="buttons">Home</button>
        <button class="buttons">Profile</button>
    </nav>

    <div class="container">
        <h1>BMI calculator</h1>
        <form >
            <p><label for="height">Height in cm: </label><input type="text" id="height"></p>
            <p><label for="Weight">Weight in kg: </label><input type="text" id="weight"></p>

            <button>Calculate</button>
            <div id="result"></div>
            <div id="result2"></div>
            <div id="weight-guide">
                <h3>BMI weight guide</h3>
                <h3>Under weight: less than 18.6</h3>
                <h3>Normal range: 18.6 to 24.9</h3>
                <h3>Over weight: Greater than 24.9</h3>
            </div>
        </form>
    </div>
    


    
</body>
</html>
