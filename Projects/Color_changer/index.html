<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class= "header-style" id="header-style">
        <h1>Click color</h1>
    </div>

            <span>Blue</span>
        </button>
        <br>
        <button class="button" id="aqua">
            <span>Aqua</span>
        </button>
        <br>
        <button class="button" id="green">
            <span>Green</span>
        </button>
        <br>
        <button class="button" id="purple">
            <span>Purple</span>
        </button>
    </div>
</body>
</html>
